name: Tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest mypy

      # No network and no API key: every test runs against tests/fixtures.
      - name: Run tests
        run: pytest tests/ -v

      # Runs on both interpreters of the matrix: see mypy.ini for why the config
      # pins no python_version.
      - name: Check types
        run: mypy .
