[mypy]
# Mismo estandar que collector/mypy.ini del monorepo: los productos de CryptoCapi
# comparten gate de tipos, no cada uno el suyo. Nivel strict + zero-Any explicito
# (Art. 4.9 / docs/DEUDA_TECNICA_ZERO_ANY.md).
#
# No se fija python_version a proposito: el CI corre mypy bajo 3.11 y 3.13, asi
# que cada interprete comprueba lo que realmente ve y no una version asumida.

# --- Base ---
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
check_untyped_defs = True
strict_optional = True

# --- Nivel strict ---
disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_incomplete_defs = True
disallow_untyped_decorators = True
warn_redundant_casts = True
warn_unused_ignores = True
strict_equality = True
extra_checks = True

# Prohibe `Any` explicito (`x: Any`, `-> dict[str, Any]`). Este repo entra en cero:
# el unico sitio era la firma de asyncio.run en agent.py, resuelto con
# Coroutine[object, object, None] en vez de un ignore.
disallow_any_explicit = True

# Sin ignore_missing_imports: httpx, rich, typer y python-dotenv traen sus propios
# tipos, asi que un import que no resuelva aqui es un problema real, no ruido.
# (El collector si lo necesita por numpy/pandas; este repo no tiene esas deps.)

# --- Tests: mismo trato relajado que en collector/mypy.ini ---
# Cargan fixtures JSON y encadenan indexados sobre el arbol crudo; exigirles el
# narrowing de produccion solo anadiria ruido a un fixture que ya esta pineado.
#
# Requiere tests/__init__.py: sin el, mypy resuelve cada test como modulo
# top-level y este patron no casa con nada, en silencio.
[mypy-tests.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_untyped_decorators = False
disallow_any_generics = False
warn_return_any = False
